<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Shipping | The Global Rani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--marble:#fff8ef;--ivory:#fffdf8;--gold:#b9852f;--gold-2:#e3b75d;--ruby:#9e1533;--rose:#c73352;--emerald:#037a5c;--dark:#34210e;--shadow:0 25px 70px rgba(70,38,12,.18)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;color:var(--dark);background:radial-gradient(circle at 20% 10%,rgba(227,183,93,.24),transparent 25%),linear-gradient(135deg,#fff9f0,#fffefd 46%,#f8ead8);min-height:100vh}.top-banner{padding:8px 16px;text-align:center;font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#fff8ef;background:linear-gradient(90deg,var(--ruby),var(--gold),var(--emerald))}nav{position:sticky;top:0;z-index:20;background:rgba(255,253,248,.84);backdrop-filter:blur(15px);border-bottom:1px solid rgba(185,133,47,.24)}.nav-inner{max-width:1180px;margin:auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:12px;text-decoration:none}.brand img{width:58px;height:58px;border-radius:50%;object-fit:cover;box-shadow:0 8px 20px rgba(185,133,47,.28)}.brand span{font-family:Cinzel,serif;font-weight:800;font-size:22px;color:var(--gold)}.nav-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.mini-link,.add-btn{border:0;text-decoration:none;color:white;font-weight:800;border-radius:999px;padding:12px 18px;background:linear-gradient(135deg,var(--ruby),var(--gold));box-shadow:0 12px 28px rgba(158,21,51,.22);cursor:pointer;display:inline-block}.mini-link{background:linear-gradient(135deg,var(--emerald),var(--gold));font-size:13px}main{max-width:980px;margin:0 auto;padding:58px 22px 80px}.hero{text-align:center;margin-bottom:28px}.eyebrow{color:var(--ruby);font-weight:900;letter-spacing:.22em;text-transform:uppercase;font-size:13px}h1,h2{font-family:Cinzel,serif}h1{font-size:clamp(38px,6vw,70px);line-height:1;margin:14px 0;background:linear-gradient(120deg,#6f3f10,var(--gold),#f1d184,var(--ruby));-webkit-background-clip:text;color:transparent}.hero p{font-size:17px;line-height:1.7;max-width:760px;margin:0 auto;color:rgba(52,33,14,.78)}.panel{border-radius:34px;padding:30px;background:rgba(255,255,255,.72);border:1px solid rgba(185,133,47,.25);box-shadow:var(--shadow)}.shipping-form{display:grid;grid-template-columns:1fr 1fr;gap:18px}.field{display:grid;gap:7px}.field.full{grid-column:1/-1}.field label{font-size:13px;font-weight:900;color:var(--ruby)}.field input,.field select,.field textarea{border:1px solid rgba(185,133,47,.32);border-radius:18px;padding:14px 16px;background:rgba(255,255,255,.78);color:var(--dark);font:inherit;outline:none}.field textarea{min-height:86px}.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(158,21,51,.45);box-shadow:0 0 0 4px rgba(158,21,51,.08)}.actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:20px}.status{font-weight:900;color:var(--emerald)}@media(max-width:680px){.nav-inner{justify-content:center;text-align:center}.brand span{font-size:18px}.shipping-form{grid-template-columns:1fr}.panel{padding:20px;border-radius:26px}.add-btn,.mini-link{width:100%;text-align:center}}
  
    /* Custom red rose cursor and pointer */
    html, body { cursor: url("assets/rose-cursor.png") 8 6, auto !important; }
    a, button, [role="button"], input[type="button"], input[type="submit"], input[type="reset"], select, .add-btn, .cta, .ghost, .mini-link, .back, .cart-btn, .checkout-btn, .carousel-btn, .carousel-dot, .remove-cart-btn, .quantity-btn, .profile-icon-link, label { cursor: url("assets/rose-pointer.png") 10 6, pointer !important; }


    /* Combined profile button with integrated dropdown arrow */
    .profile-menu-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; }
    .profile-trigger {
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255,245,190,.88);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 25%, #fff7d6, var(--gold) 38%, var(--ruby) 100%);
      box-shadow: 0 12px 28px rgba(158,21,51,.22);
      position: relative;
      overflow: visible;
      padding: 0;
      display: inline-grid;
      place-items: center;
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease;
    }
    .profile-trigger::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      top: 11px;
      border-radius: 50%;
      background: #fff8ef;
      box-shadow: 0 0 0 2px rgba(255,255,255,.28);
    }
    .profile-trigger::after {
      content: "";
      position: absolute;
      width: 26px;
      height: 14px;
      bottom: 12px;
      border-radius: 18px 18px 8px 8px;
      background: #fff8ef;
    }
    .profile-trigger:hover, .profile-menu-wrap.open .profile-trigger { transform: translateY(-3px) scale(1.04); box-shadow: 0 16px 32px rgba(158,21,51,.25); }
    .profile-trigger.logged-in { background: radial-gradient(circle at 35% 25%, #fff7d6, var(--emerald) 42%, var(--gold) 100%); }
    .profile-caret-badge {
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid rgba(255,245,190,.92);
      background: linear-gradient(135deg, var(--ruby), var(--gold));
      color: #fff8ef;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 20px rgba(158,21,51,.24);
      transition: transform .22s ease, box-shadow .22s ease;
      pointer-events: none;
    }
    .profile-menu-wrap.open .profile-caret-badge { transform: rotate(180deg); box-shadow: 0 12px 24px rgba(158,21,51,.28); }
    .profile-dropdown {
      display: none;
      position: absolute;
      left: 50%;
      top: calc(100% + 10px);
      transform: translateX(-50%);
      min-width: 170px;
      padding: 8px;
      border-radius: 18px;
      background: rgba(255,253,248,.98);
      border: 1px solid rgba(185,133,47,.28);
      box-shadow: 0 18px 42px rgba(70,38,12,.18);
      z-index: 999;
    }
    .profile-dropdown::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -7px;
      width: 14px;
      height: 14px;
      transform: translateX(-50%) rotate(45deg);
      background: rgba(255,253,248,.98);
      border-left: 1px solid rgba(185,133,47,.28);
      border-top: 1px solid rgba(185,133,47,.28);
    }
    .profile-menu-wrap.open .profile-dropdown { display: block; animation: profileDropdownIn .18s ease both; }
    .profile-dropdown a { display: block; position: relative; z-index: 1; padding: 11px 14px; border-radius: 14px; text-decoration: none; color: var(--dark); font-size: 14px; font-weight: 900; white-space: nowrap; text-align: center; }
    .profile-dropdown a:hover { background: linear-gradient(135deg, rgba(158,21,51,.10), rgba(185,133,47,.16)); color: var(--ruby); }
    @keyframes profileDropdownIn { from { opacity: 0; transform: translateX(-50%) translateY(-6px) scale(.98); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }



    /* Store-style personalized footer */
    .site-footer {
      text-align: left;
      padding: 0;
      background: #f4f3f1;
      color: #333;
      border-top: 1px solid rgba(52,33,14,.12);
      position: relative;
      overflow: hidden;
    }
    .site-footer::before { display: none; }
    .site-footer img { width: auto; border-radius: 0; box-shadow: none; }
    .footer-main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 42px 22px 58px;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 72px;
      align-items: start;
    }
    .footer-heading {
      margin: 0 0 22px;
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 600;
      color: #4a4038;
    }
    .footer-brand-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      color: #34210e;
      font-family: 'Cinzel', serif;
      font-weight: 800;
    }
    .footer-brand-line img {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 8px 18px rgba(70,38,12,.14);
    }
    .footer-link-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 28px;
      max-width: 560px;
    }
    .footer-link-grid a {
      color: #333;
      text-decoration: none;
      font-size: 15px;
      line-height: 1.35;
      transition: color .2s ease, transform .2s ease;
    }
    .footer-link-grid a:hover {
      color: var(--ruby);
      transform: translateY(-1px);
    }
    .footer-note {
      max-width: 520px;
      margin: 18px 0 0;
      font-size: 14px;
      line-height: 1.7;
      color: #5f5650;
    }
    .newsletter-row {
      display: flex;
      width: min(100%, 530px);
      align-items: stretch;
    }
    .newsletter-row input {
      flex: 1;
      min-width: 0;
      border: 1px solid #cfcac5;
      background: #fff;
      padding: 14px 18px;
      font: inherit;
      font-size: 15px;
      color: #333;
      outline: none;
    }
    .newsletter-row input:focus {
      border-color: var(--gold);
      box-shadow: inset 0 0 0 1px rgba(185,133,47,.35);
    }
    .newsletter-row button {
      border: 0;
      background: #3d3b3b;
      color: #fff;
      padding: 0 20px;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      cursor: pointer;
      text-transform: uppercase;
    }
    .newsletter-row button:hover { background: var(--ruby); }
    .footer-bottom {
      border-top: 1px solid rgba(52,33,14,.12);
      max-width: 100%;
      padding: 20px 0 44px;
    }
    .footer-bottom-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 30px;
      align-items: center;
    }
    .currency-select {
      width: 92px;
      border: 1px solid #cfcac5;
      background: #fff;
      padding: 10px 12px;
      font: inherit;
      color: #111;
      margin-bottom: 20px;
    }
    .payment-icons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .pay-badge {
      min-width: 38px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid #d5d5d5;
      background: #fff;
      color: #111;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }
    .pay-badge.dark { background: #111; color: #fff; border-color: #111; }
    .pay-badge.shop { background: #5a31f4; color: #fff; border-color: #5a31f4; }
    .footer-copy {
      font-size: 13px;
      color: #333;
      text-align: right;
      white-space: nowrap;
    }
    @media (max-width: 820px) {
      .footer-main { grid-template-columns: 1fr; gap: 34px; padding-bottom: 36px; }
      .footer-bottom-inner { grid-template-columns: 1fr; }
      .footer-copy { text-align: left; white-space: normal; }
      .newsletter-row { width: 100%; }
    }
    @media (max-width: 520px) {
      .footer-link-grid { gap: 12px 20px; }
      .footer-link-grid a { font-size: 14px; }
      .newsletter-row { flex-direction: column; gap: 10px; }
      .newsletter-row button { padding: 14px 18px; }
    }



    /* Floating Global Rani chat widget */
    .global-rani-chat { position: fixed; right: 22px; bottom: 22px; z-index: 9999; font-family: Inter, Arial, sans-serif; }
    .global-rani-chat-panel { width: min(360px, calc(100vw - 28px)); max-height: min(620px, calc(100vh - 110px)); display: none; flex-direction: column; overflow: hidden; border-radius: 28px; border: 1px solid rgba(185,133,47,.34); background: rgba(255,253,248,.96); box-shadow: 0 24px 75px rgba(52,33,14,.26); backdrop-filter: blur(14px); }
    .global-rani-chat.open .global-rani-chat-panel { display: flex; animation: globalRaniChatIn .25s ease both; }
    @keyframes globalRaniChatIn { from { opacity: 0; transform: translateY(16px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .global-rani-chat-header { display: flex; align-items: center; gap: 12px; padding: 16px; background: linear-gradient(135deg, var(--ruby), var(--gold)); color: #fff; }
    .global-rani-chat-logo { width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.38); font-size: 24px; box-shadow: inset 0 0 18px rgba(255,255,255,.18); }
    .global-rani-chat-title { flex: 1; min-width: 0; }
    .global-rani-chat-title strong { display: block; font-family: Cinzel, serif; font-size: 16px; letter-spacing: .02em; }
    .global-rani-chat-title span { display: block; font-size: 12px; opacity: .9; margin-top: 2px; }
    .global-rani-chat-close { border: 0; width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,.18); color: #fff; font-size: 22px; line-height: 1; cursor: pointer; }
    .global-rani-chat-messages { padding: 15px; overflow-y: auto; display: grid; gap: 10px; background: radial-gradient(circle at 10% 0%, rgba(227,183,93,.18), transparent 32%), rgba(255,248,239,.72); }
    .global-rani-chat-bubble { max-width: 86%; padding: 11px 13px; border-radius: 18px; line-height: 1.45; font-size: 13px; font-weight: 650; box-shadow: 0 10px 24px rgba(70,38,12,.08); }
    .global-rani-chat-bubble.bot { justify-self: start; color: var(--dark); background: #fff; border: 1px solid rgba(185,133,47,.18); border-bottom-left-radius: 7px; }
    .global-rani-chat-bubble.user { justify-self: end; color: #fff; background: linear-gradient(135deg, var(--ruby), var(--rose)); border-bottom-right-radius: 7px; }
    .global-rani-chat-quick { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 15px 14px; background: rgba(255,248,239,.72); }
    .global-rani-chat-quick button { border: 1px solid rgba(185,133,47,.32); border-radius: 999px; background: #fff; color: var(--ruby); font-weight: 900; font-size: 12px; padding: 8px 10px; cursor: pointer; }
    .global-rani-chat-quick button:hover { background: rgba(185,133,47,.12); transform: translateY(-1px); }
    .global-rani-chat-form { display: flex; gap: 8px; padding: 12px; border-top: 1px solid rgba(185,133,47,.18); background: rgba(255,255,255,.92); }
    .global-rani-chat-form input { flex: 1; min-width: 0; border: 1px solid rgba(185,133,47,.28); border-radius: 999px; padding: 12px 14px; font: inherit; outline: none; background: #fff; color: var(--dark); }
    .global-rani-chat-form input:focus { border-color: rgba(158,21,51,.45); box-shadow: 0 0 0 4px rgba(158,21,51,.08); }
    .global-rani-chat-form button { border: 0; border-radius: 999px; padding: 0 16px; background: linear-gradient(135deg, var(--ruby), var(--gold)); color: #fff; font-weight: 950; cursor: pointer; }
    .global-rani-chat-toggle { margin-left: auto; margin-top: 12px; min-width: 68px; height: 60px; border: 0; border-radius: 999px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0 18px; background: linear-gradient(135deg, var(--ruby), var(--gold)); color: #fff; font-weight: 950; box-shadow: 0 16px 44px rgba(158,21,51,.28); cursor: pointer; }
    .global-rani-chat-toggle .chat-sparkle { font-size: 24px; animation: globalRaniChatPulse 1.8s ease-in-out infinite; }
    @keyframes globalRaniChatPulse { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.12) rotate(6deg); } }
    .global-rani-chat.open .global-rani-chat-toggle { display: none; }
    @media (max-width: 620px) { .global-rani-chat { right: 14px; bottom: 14px; } .global-rani-chat-panel { width: calc(100vw - 28px); max-height: calc(100vh - 84px); border-radius: 24px; } .global-rani-chat-toggle { height: 56px; padding: 0 15px; } }

  </style>
</head>
<body>
  <div class="top-banner">We Ship Globally</div>
  <nav><div class="nav-inner"><a class="brand" href="index.html"><img src="assets/global-rani-logo.png" alt="The Global Rani logo"><span>The Global Rani</span></a><div class="nav-actions"><div class="profile-menu-wrap" id="shippingProfileMenu"><button class="profile-trigger logged-in bloom-hover" type="button" title="Member menu" aria-label="Open member menu" aria-haspopup="true" aria-expanded="false"><span class="profile-caret-badge">⌄</span></button><div class="profile-dropdown" role="menu"><a href="#" id="shippingLogoutLink" role="menuitem">Log out</a></div></div></div></div></nav>
  <main>
    <div class="hero"><div class="eyebrow">Shipping Verification</div><h1>Verify Your Shipping Address</h1><p>Please confirm where your jewelry should be shipped. After you save this, you will be sent to checkout.</p></div>
    <section class="panel">
      <h2>Shipping Information</h2>
      <form class="shipping-form" id="shippingForm">
        <div class="field full"><label for="customerName">Full Name</label><input id="customerName" name="customerName" required placeholder="Full name"></div>
        <div class="field"><label for="customerEmail">Email</label><input id="customerEmail" name="customerEmail" type="email" required placeholder="name@example.com"></div>
        <div class="field"><label for="customerPhone">Phone Number</label><input id="customerPhone" name="customerPhone" required placeholder="Phone number"></div>
        <div class="field"><label for="shippingCountry">Country</label><input id="shippingCountry" name="shippingCountry" required placeholder="Country"></div>
        <div class="field full"><label for="shippingAddress1">Street Address</label><input id="shippingAddress1" name="shippingAddress1" required placeholder="Street address"></div>
        <div class="field full"><label for="shippingAddress2">Apartment / Suite / Landmark</label><input id="shippingAddress2" name="shippingAddress2" placeholder="Apartment, suite, landmark"></div>
        <div class="field"><label for="shippingCity">City</label><input id="shippingCity" name="shippingCity" required placeholder="City"></div>
        <div class="field"><label for="shippingState">State / Province</label><input id="shippingState" name="shippingState" required placeholder="State / Province"></div>
        <div class="field"><label for="shippingZip">ZIP / Postal Code</label><input id="shippingZip" name="shippingZip" required placeholder="ZIP / Postal Code"></div>
        <div class="field full"><label for="deliveryNotes">Delivery Notes</label><textarea id="deliveryNotes" name="deliveryNotes" placeholder="Gate code, delivery timing, etc."></textarea></div>
        <div class="field full"><label for="profileNotes">Special Requests</label><textarea id="profileNotes" name="profileNotes" placeholder="Gift wrapping, sizing, occasion, etc."></textarea></div>
      </form>
      <div class="actions"><button class="add-btn" type="submit" form="shippingForm">Verify Shipping & Go to Checkout</button><span class="status" id="shippingStatus"></span></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      setPersistence,
      browserSessionPersistence,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBise9pqTYgQwmG-xOVZQ0-30j1EvcgDng",
      authDomain: "the-global-rani-website.firebaseapp.com",
      projectId: "the-global-rani-website",
      storageBucket: "the-global-rani-website.firebasestorage.app",
      messagingSenderId: "603989663669",
      appId: "1:603989663669:web:24c32f6c1bce81a20803fc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    await setPersistence(auth, browserSessionPersistence);

    let currentUser = null;
    let isShippingLoggingOut = false;


    function clearMemberSession() {
      sessionStorage.removeItem("globalRaniLoggedInMember");
      sessionStorage.removeItem("globalRaniCheckoutMode");
      sessionStorage.removeItem("globalRaniRequireShippingVerification");
      sessionStorage.removeItem("globalRaniReturnToCheckoutAfterVerify");
    }

    function setupShippingLogout() {
      const logoutLink = document.getElementById("shippingLogoutLink");
      if (!logoutLink) return;
      logoutLink.addEventListener("click", async (event) => {
        event.preventDefault();
        isShippingLoggingOut = true;
        clearMemberSession();
        try {
          await signOut(auth);
        } catch (error) {
          console.warn("Firebase logout issue:", error);
        }
        window.location.href = "account.html?action=login";
      });
    }

    function setSessionMember(user) {
      sessionStorage.setItem("globalRaniLoggedInMember", JSON.stringify({
        firstName: "",
        lastName: "",
        email: user.email || "",
        uid: user.uid || ""
      }));
      sessionStorage.setItem("globalRaniCheckoutMode", "member");
    }

    function getSavedShippingProfiles() {
      try { return JSON.parse(localStorage.getItem("globalRaniShippingProfiles") || "{}"); } catch (e) { return {}; }
    }

    function fillSavedProfile(email) {
      const profiles = getSavedShippingProfiles();
      const saved = profiles[String(email || "").toLowerCase()];
      if (!saved) return;
      const form = document.getElementById("shippingForm");
      Object.entries(saved).forEach(([key, value]) => {
        const field = form.elements[key];
        if (field && typeof value === "string") field.value = value;
      });
    }

    const requestedCheckoutMode = sessionStorage.getItem("globalRaniCheckoutMode");
    setupShippingLogout();

    if (requestedCheckoutMode === "guest") {
      currentUser = null;
      sessionStorage.removeItem("globalRaniLoggedInMember");
      console.log("Guest shipping verification: Firebase login is not required.");
      const menu = document.getElementById("shippingProfileMenu");
      if (menu) menu.style.display = "none";
    } else {
      onAuthStateChanged(auth, (user) => {
        if (user) {
          currentUser = user;
          console.log("Customer is logged in:", user.email);
          setSessionMember(user);
          const emailField = document.getElementById("customerEmail");
          if (emailField && !emailField.value) emailField.value = user.email || "";
          fillSavedProfile(user.email);
        } else {
          if (isShippingLoggingOut) return;
          alert("Please login first, or choose Continue as Guest from the cart.");
          window.location.href = "index.html";
        }
      });
    }

    document.getElementById("shippingForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      if (!form.reportValidity()) return;
      const profile = Object.fromEntries(new FormData(form).entries());
      const profileWithTime = { ...profile, savedAt: new Date().toISOString() };
      if (requestedCheckoutMode === "guest") {
        sessionStorage.setItem("globalRaniGuestShippingProfile", JSON.stringify(profileWithTime));
        sessionStorage.setItem("globalRaniCustomerProfile", JSON.stringify(profileWithTime));
        sessionStorage.setItem("globalRaniCheckoutMode", "guest");
      } else {
        if (!currentUser) {
          alert("Please login first, or choose Continue as Guest from the cart.");
          window.location.href = "index.html";
          return;
        }
        const profiles = getSavedShippingProfiles();
        profiles[(currentUser.email || profile.customerEmail || "").toLowerCase()] = profileWithTime;
        localStorage.setItem("globalRaniShippingProfiles", JSON.stringify(profiles));
        sessionStorage.setItem("globalRaniCustomerProfile", JSON.stringify(profileWithTime));
        sessionStorage.setItem("globalRaniCheckoutMode", "member");
      }
      sessionStorage.removeItem("globalRaniRequireShippingVerification");
      sessionStorage.removeItem("globalRaniReturnToCheckoutAfterVerify");
      document.getElementById("shippingStatus").textContent = "Shipping information verified. Opening checkout...";
      window.location.href = "checkout.html#checkout";
    });
  </script>

<script>
  (function(){
    function closeProfileMenus(exceptWrap){
      document.querySelectorAll('.profile-menu-wrap.open').forEach(wrap => {
        if (wrap !== exceptWrap) {
          wrap.classList.remove('open');
          const arrow = wrap.querySelector('.profile-trigger');
          if (arrow) arrow.setAttribute('aria-expanded', 'false');
        }
      });
    }
    document.addEventListener('click', function(event){
      const arrow = event.target.closest('.profile-trigger');
      if (arrow) {
        const wrap = arrow.closest('.profile-menu-wrap');
        const willOpen = !wrap.classList.contains('open');
        closeProfileMenus(wrap);
        wrap.classList.toggle('open', willOpen);
        arrow.setAttribute('aria-expanded', String(willOpen));
        event.preventDefault();
        event.stopPropagation();
        return;
      }
      if (!event.target.closest('.profile-menu-wrap')) closeProfileMenus(null);
    });
    document.addEventListener('keydown', function(event){
      if (event.key === 'Escape') closeProfileMenus(null);
    });
  })();
</script>



<div class="global-rani-chat" id="globalRaniChat" aria-live="polite">
  <div class="global-rani-chat-panel" role="dialog" aria-label="The Global Rani chat">
    <div class="global-rani-chat-header">
      <div class="global-rani-chat-logo" aria-hidden="true">👑</div>
      <div class="global-rani-chat-title">
        <strong>The Global Rani Chat</strong>
        <span>Ask us about jewelry, shipping, checkout, or styling.</span>
      </div>
      <button class="global-rani-chat-close" type="button" aria-label="Close chat">×</button>
    </div>
    <div class="global-rani-chat-messages" data-chat-messages></div>
    <div class="global-rani-chat-quick" aria-label="Quick chat options">
      <button type="button" data-chat-quick="Shipping">Shipping</button>
      <button type="button" data-chat-quick="Returns">Returns</button>
      <button type="button" data-chat-quick="Payments">Payments</button>
      <button type="button" data-chat-quick="Product help">Product help</button>
    </div>
    <form class="global-rani-chat-form" data-chat-form>
      <input type="text" data-chat-input placeholder="Type your message..." autocomplete="off" aria-label="Type your chat message">
      <button type="submit">Send</button>
    </form>
  </div>
  <button class="global-rani-chat-toggle" type="button" aria-label="Open The Global Rani chat">
    <span class="chat-sparkle" aria-hidden="true">💬</span>
    <span>Chat</span>
  </button>
</div>

<script>
  (function(){
    const chat = document.getElementById('globalRaniChat');
    if (!chat) return;
    const panel = chat.querySelector('.global-rani-chat-panel');
    const toggle = chat.querySelector('.global-rani-chat-toggle');
    const closeBtn = chat.querySelector('.global-rani-chat-close');
    const messages = chat.querySelector('[data-chat-messages]');
    const form = chat.querySelector('[data-chat-form]');
    const input = chat.querySelector('[data-chat-input]');
    const replies = {
      'shipping': 'We ship Indian jewelry worldwide. After you add products to the cart, you can verify your shipping address before PayPal checkout.',
      'returns': 'For returns or exchanges, please keep your order details ready and contact The Global Rani support so we can help you with the next step.',
      'payments': 'Checkout is handled through PayPal. You can use PayPal-supported payment methods when you reach the secure checkout section.',
      'product help': 'Tell us which jewelry set you like, and we can help with styling, gifting, or collection suggestions.',
      'default': 'Thank you for messaging The Global Rani. Please share your question, product name, or order concern. For direct support, email hello@theglobalrani.com.'
    };
    function addMessage(text, who){
      const bubble = document.createElement('div');
      bubble.className = 'global-rani-chat-bubble ' + (who === 'user' ? 'user' : 'bot');
      bubble.textContent = text;
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
    }
    function botReply(text){ setTimeout(() => addMessage(text, 'bot'), 260); }
    function getReply(text){
      const clean = String(text || '').toLowerCase();
      if (clean.includes('ship') || clean.includes('delivery')) return replies.shipping;
      if (clean.includes('return') || clean.includes('exchange') || clean.includes('refund')) return replies.returns;
      if (clean.includes('pay') || clean.includes('paypal') || clean.includes('checkout')) return replies.payments;
      if (clean.includes('product') || clean.includes('jewelry') || clean.includes('necklace') || clean.includes('set') || clean.includes('style')) return replies['product help'];
      return replies.default;
    }
    function openChat(){ chat.classList.add('open'); panel.setAttribute('aria-hidden', 'false'); if (!messages.dataset.started) { addMessage('Hi beautiful Rani 👑 How can we help you today?', 'bot'); messages.dataset.started = 'true'; } setTimeout(() => input.focus(), 80); }
    function closeChat(){ chat.classList.remove('open'); panel.setAttribute('aria-hidden', 'true'); }
    toggle.addEventListener('click', openChat);
    closeBtn.addEventListener('click', closeChat);
    chat.querySelectorAll('[data-chat-quick]').forEach(button => {
      button.addEventListener('click', () => {
        const text = button.getAttribute('data-chat-quick');
        addMessage(text, 'user');
        botReply(getReply(text));
      });
    });
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      input.value = '';
      botReply(getReply(text));
    });
    document.addEventListener('keydown', (event) => { if (event.key === 'Escape' && chat.classList.contains('open')) closeChat(); });
    panel.setAttribute('aria-hidden', 'true');
  })();
</script>
